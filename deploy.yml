name: Deploy Goated Fun to GitHub Pages

on:
  push:
    branches:
      - main  # Set this to the name of your default branch (e.g. main)

permissions:
  contents: write

jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Deploys the built folder
          branch: gh-pages # Pushes compiled assets to a standard gh-pages deployment branch
